services:
  postgres:
    image: postgres:16-alpine
    container_name: homestock-ai-postgres
    environment:
      POSTGRES_DB: homestock_ai
      POSTGRES_USER: homestock
      POSTGRES_PASSWORD: homestock
    ports:
      - "5432:5432"
    volumes:
      - homestock_ai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homestock -d homestock_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  homestock_ai_postgres:
